name: Focus iOS CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: focus-ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Focus Build
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode 26.5
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks

      - name: Bootstrap Focus
        run: ./bootstrap.sh focus

      - name: Build Focus
        run: scripts/build-simulator.sh
